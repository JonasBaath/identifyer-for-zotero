name: Save traffic stats

on:
  schedule:
    - cron: "0 6 * * *"   # every day at 06:00 UTC
  workflow_dispatch:       # also runnable manually from GitHub UI

jobs:
  traffic:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch traffic data and upsert log
        env:
          GH_TOKEN: ${{ secrets.TAFFIC_TOKEN }}
        run: |
          REPO="JonasBaath/identifyer-for-zotero"
          gh api "repos/$REPO/traffic/views"  > /tmp/views.json
          gh api "repos/$REPO/traffic/clones" > /tmp/clones.json

          python3 <<'PY'
          import csv, json
          from pathlib import Path

          views  = json.load(open('/tmp/views.json'))['views']
          clones = json.load(open('/tmp/clones.json'))['clones']

          rows = {}
          for v in views:
              date = v['timestamp'][:10]
              rows.setdefault(date, {'views': 0, 'unique_views': 0, 'clones': 0, 'unique_clones': 0})
              rows[date]['views']        = v['count']
              rows[date]['unique_views'] = v['uniques']
          for c in clones:
              date = c['timestamp'][:10]
              rows.setdefault(date, {'views': 0, 'unique_views': 0, 'clones': 0, 'unique_clones': 0})
              rows[date]['clones']        = c['count']
              rows[date]['unique_clones'] = c['uniques']

          log = Path('traffic-log.csv')
          existing = {}
          if log.exists():
              with log.open() as f:
                  for row in csv.DictReader(f):
                      existing[row['date']] = row

          for date, data in rows.items():
              existing[date] = {'date': date, **{k: str(v) for k, v in data.items()}}

          with log.open('w', newline='') as f:
              writer = csv.DictWriter(
                  f, fieldnames=['date','views','unique_views','clones','unique_clones']
              )
              writer.writeheader()
              for date in sorted(existing):
                  writer.writerow(existing[date])

          print(f"API covered {len(rows)} dates; total rows in log: {len(existing)}")
          PY

      - name: Commit log
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add traffic-log.csv
          git diff --cached --quiet || git commit -m "traffic: update $(date -u +%Y-%m-%d)"
          git push
