name: Save traffic stats

on:
  schedule:
    - cron: "0 6 * * *"   # every day at 06:00 UTC
  workflow_dispatch:       # also runnable manually from GitHub UI

jobs:
  traffic:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch and append traffic data
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO="JonasBaath/identifyer-for-zotero"
          LOG="traffic-log.csv"

          # Create header if file doesn't exist
          if [ ! -f "$LOG" ]; then
            echo "date,views,unique_views,clones,unique_clones" > "$LOG"
          fi

          # Fetch views and clones
          VIEWS=$(gh api repos/$REPO/traffic/views)
          CLONES=$(gh api repos/$REPO/traffic/clones)

          # Extract today's date
          TODAY=$(date -u +%Y-%m-%d)

          # Parse today's numbers (default to 0 if not present)
          VIEW_COUNT=$(echo "$VIEWS" | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          today = '$TODAY'
          for v in data.get('views', []):
              if v['timestamp'].startswith(today):
                  print(v['count'], v['uniques'])
                  sys.exit()
          print('0 0')
          ")
          CLONE_COUNT=$(echo "$CLONES" | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          today = '$TODAY'
          for c in data.get('clones', []):
              if c['timestamp'].startswith(today):
                  print(c['count'], c['uniques'])
                  sys.exit()
          print('0 0')
          ")

          V=$(echo $VIEW_COUNT | cut -d' ' -f1)
          UV=$(echo $VIEW_COUNT | cut -d' ' -f2)
          C=$(echo $CLONE_COUNT | cut -d' ' -f1)
          UC=$(echo $CLONE_COUNT | cut -d' ' -f2)

          # Append row if date not already logged
          if ! grep -q "^$TODAY," "$LOG"; then
            echo "$TODAY,$V,$UV,$C,$UC" >> "$LOG"
            echo "Logged: $TODAY views=$V unique_views=$UV clones=$C unique_clones=$UC"
          else
            echo "Already logged for $TODAY, skipping."
          fi

      - name: Commit log
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add traffic-log.csv
          git diff --cached --quiet || git commit -m "traffic: $(date -u +%Y-%m-%d)"
          git push
