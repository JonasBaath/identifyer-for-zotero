name: Build standalone binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: identifyer-for-zotero-linux-x64
            archive_ext: tar.gz
            binary_name: identifyer-for-zotero
          - os: windows-latest
            artifact_name: identifyer-for-zotero-windows-x64
            archive_ext: zip
            binary_name: identifyer-for-zotero.exe
          - os: macos-14
            artifact_name: identifyer-for-zotero-macos-arm64
            archive_ext: zip
            binary_name: identifyer-for-zotero
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        shell: bash
        run: |
          pyinstaller --onefile --console \
            --name identifyer-for-zotero \
            --collect-all lxml \
            --collect-all rapidfuzz \
            main.py

      - name: Package binary
        shell: bash
        env:
          ARTIFACT: ${{ matrix.artifact_name }}
          BINARY: ${{ matrix.binary_name }}
        run: |
          cd dist
          case "$RUNNER_OS" in
            Windows) 7z a "../${ARTIFACT}.zip" "$BINARY" ;;
            macOS)   zip "../${ARTIFACT}.zip" "$BINARY" ;;
            Linux)   tar czf "../${ARTIFACT}.tar.gz" "$BINARY" ;;
          esac

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}.${{ matrix.archive_ext }}

  build-macos-intel:
    runs-on: macos-14
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up x86_64 Python (Rosetta)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          architecture: 'x64'

      - name: Verify Rosetta + arch
        run: |
          arch -x86_64 python -c "import platform; print('machine:', platform.machine())"

      - name: Install dependencies (x86_64)
        run: |
          arch -x86_64 python -m pip install --upgrade pip
          arch -x86_64 python -m pip install -r requirements.txt
          arch -x86_64 python -m pip install pyinstaller

      - name: Build with PyInstaller (x86_64)
        run: |
          arch -x86_64 python -m PyInstaller --onefile --console \
            --name identifyer-for-zotero \
            --collect-all lxml \
            --collect-all rapidfuzz \
            main.py

      - name: Package binary
        run: |
          cd dist
          zip ../identifyer-for-zotero-macos-x64.zip identifyer-for-zotero

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: identifyer-for-zotero-macos-x64
          path: identifyer-for-zotero-macos-x64.zip

  release:
    needs: [build, build-macos-intel]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          fail_on_unmatched_files: false
          generate_release_notes: true
